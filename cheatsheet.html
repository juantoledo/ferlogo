<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐢 FerLogo — Para imprimir · Printable</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: "Comic Sans MS", "Baloo 2", "Trebuchet MS", system-ui, sans-serif;
    color: #2b2c34; margin: 0; background: #fef6e4;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .page { max-width: 1000px; margin: 0 auto; padding: 20px; }

  header { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 6px; }
  header svg { width: 64px; height: 64px; }
  header h1 { font-size: 2rem; margin: 0; }

  /* tiny icon legend: type -> enter -> draw (almost no words) */
  .legend {
    display: flex; align-items: center; justify-content: center; gap: 14px;
    font-size: 1.5rem; margin: 6px 0 16px;
  }
  .legend .step { display: flex; align-items: center; gap: 8px; }
  .legend small { font-size: .8rem; color: #777; }

  .printbar { text-align: center; margin-bottom: 16px; }
  .printbtn {
    border: 0; cursor: pointer; background: #ff7a59; color: #fff; font-weight: bold;
    font-size: 1.05rem; padding: 12px 22px; border-radius: 999px; font-family: inherit;
    box-shadow: 0 6px 16px rgba(0,0,0,.15);
  }

  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

  .card {
    background: #fff; border: 3px solid #ffe2d1; border-radius: 22px; padding: 14px;
    display: flex; flex-direction: column; align-items: center; gap: 10px; break-inside: avoid;
  }
  .pic {
    width: 100%; height: 170px; background: #fffdf7;
    border: 2px dashed #ffd6c2; border-radius: 16px; display: grid; place-items: center;
  }
  .pic svg { width: 150px; height: 150px; }

  /* self-drawing line: the shape grows as if the turtle is walking it */
  .draw {
    stroke-dasharray: 1; stroke-dashoffset: 1;
    animation-name: draw; animation-timing-function: ease-in-out;
    animation-iteration-count: infinite; animation-fill-mode: forwards;
  }
  @keyframes draw {
    0%   { stroke-dashoffset: 1; }   /* nothing drawn yet */
    60%  { stroke-dashoffset: 0; }   /* fully drawn */
    100% { stroke-dashoffset: 0; }   /* hold so kids see the result */
  }

  /* one or more steps, each its own line + its own Enter */
  .steps { display: flex; flex-direction: column; gap: 8px; width: 100%; align-items: center; }
  /* the line to type — big and clear for little fingers to copy */
  .say { display: flex; align-items: center; gap: 10px; justify-content: center; }
  .code {
    font-family: "Courier New", monospace; font-weight: bold; font-size: 1.15rem;
    letter-spacing: .5px; color: #2b2c34; background: #fff3e9; border: 2px solid #ffd6c2;
    border-radius: 12px; padding: 8px 12px; text-align: center; line-height: 1.5;
  }
  /* the Enter key, drawn like a real key cap */
  .enter {
    flex: 0 0 auto; display: inline-grid; place-items: center; gap: 0;
    background: #2ec4b6; color: #fff; border-radius: 12px;
    box-shadow: 0 4px 0 #1f9488; padding: 8px 12px; min-width: 58px;
  }
  .enter .sym { font-size: 1.7rem; line-height: 1; }
  .enter .lbl { font-size: .68rem; font-weight: bold; letter-spacing: 1px; }

  /* numbered section headings */
  .section-title {
    display: flex; align-items: center; gap: 12px; margin: 26px 0 12px; break-after: avoid;
  }
  .section-title .badge {
    display: inline-grid; place-items: center; width: 44px; height: 44px; border-radius: 50%;
    background: #4ea8de; color: #fff; font-size: 1.6rem; font-weight: bold; flex: 0 0 auto;
  }
  .section-title h2 { font-size: 1.4rem; margin: 0; }
  .section-title .emoji { font-size: 1.6rem; }

  /* color section: smaller cards, big colored blob */
  .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .card.mini { padding: 12px; gap: 8px; }
  .card.mini .blob { width: 78px; height: 78px; border-radius: 50%; border: 3px solid rgba(0,0,0,.12); }
  .card.mini .code { font-size: 1.05rem; padding: 6px 10px; }
  .card.mini .enter { padding: 5px 10px; min-width: 0; }
  .card.mini .enter .sym { font-size: 1.2rem; }

  footer { text-align: center; color: #aaa; font-size: .8rem; margin: 22px 0 8px; }

  @media (max-width: 820px) { .grid { grid-template-columns: repeat(2, 1fr); } .grid4 { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 540px) { .grid { grid-template-columns: 1fr; } .grid4 { grid-template-columns: repeat(2, 1fr); } }
  /* on paper (or if the kid prefers less motion) show the finished shape, no crawler */
  @media print {
    body { background: #fff; }
    .no-print { display: none !important; }
    .page { max-width: none; padding: 0; }
    .card { break-inside: avoid; }
    .draw { animation: none !important; stroke-dashoffset: 0 !important; }
    .crawler { display: none !important; }
    @page { margin: 10mm; }
  }
  @media (prefers-reduced-motion: reduce) {
    .draw { animation: none !important; stroke-dashoffset: 0 !important; }
    .crawler { display: none !important; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <svg id="mascot" viewBox="0 0 100 100"></svg>
    <h1>🐢 FerLogo</h1>
  </header>

  <!-- icon-only idea: ⌨️ type  →  ⏎ press Enter  →  🎨 you get the picture -->
  <div class="legend">
    <span class="step">⌨️<small>escribe·type</small></span>
    <span>→</span>
    <span class="step">⏎<small>Enter</small></span>
    <span>→</span>
    <span class="step">🎨<small>¡dibujo!·draw!</small></span>
  </div>

  <div class="printbar no-print">
    <button class="printbtn" onclick="window.print()">🖨️ Imprimir · Print</button>
  </div>

  <div class="section-title"><span class="badge">1</span><span class="emoji">🚶</span><h2>Muy fácil · Very easy</h2></div>
  <div class="grid" id="basic"></div>

  <div class="section-title"><span class="badge">2</span><span class="emoji">🎨</span><h2>Colores · Colors</h2></div>
  <div class="grid4" id="colors"></div>

  <div class="section-title"><span class="badge">3</span><span class="emoji">⭐</span><h2>Dibujos · Pictures</h2></div>
  <div class="grid" id="pictures"></div>

  <footer>🐢 FerLogo</footer>
</div>

<script>
"use strict";

/* ---------- mini Logo -> SVG renderer (matches the app's commands) ---------- */
const COLORS = {
  red:"#e63946", rojo:"#e63946", blue:"#1d72c4", azul:"#1d72c4",
  green:"#2a9d39", verde:"#2a9d39", yellow:"#f1c40f", amarillo:"#f1c40f",
  orange:"#f3722c", naranja:"#f3722c", purple:"#8e44ad", morado:"#8e44ad",
  pink:"#ff5d8f", rosa:"#ff5d8f", black:"#2b2c34", negro:"#2b2c34",
  white:"#ffffff", blanco:"#ffffff", brown:"#8b5a2b", marron:"#8b5a2b",
  gray:"#7d8597", gris:"#7d8597", turquoise:"#06b6d4", turquesa:"#06b6d4",
  lime:"#84cc16", lima:"#84cc16",
};
const CMD = {
  adelante:"move", av:"move", forward:"move", fd:"move",
  atras:"moveb", re:"moveb", back:"moveb", bk:"moveb",
  derecha:"right", gd:"right", right:"right", rt:"right",
  izquierda:"left", gi:"left", left:"left", lt:"left",
  subelapiz:"penup", sl:"penup", penup:"penup", pu:"penup",
  bajalapiz:"pendown", bl:"pendown", pendown:"pendown", pd:"pendown",
  color:"color", grosor:"width", width:"width",
  repite:"repeat", repeat:"repeat", rp:"repeat",
  circulo:"circle", circle:"circle", ci:"circle", cuadrado:"square", square:"square", cu:"square",
  triangulo:"triangle", triangle:"triangle", tr:"triangle", rectangulo:"rectangle", rectangle:"rectangle", rc:"rectangle",
  poligono:"polygon", polygon:"polygon", pg:"polygon", estrella:"star", star:"star", es:"star",
};
const FIG = { circle:1, square:1, triangle:1, star:1, polygon:2, rectangle:2 };
const m = (v) => ({ op:"move", value:v }), r = (v) => ({ op:"right", value:v });
function poly(sides, side) { const t = 360/sides, o = []; for (let k=0;k<sides;k++) o.push(m(side), r(t)); return o; }
function rect(w,h) { return [m(w),r(90),m(h),r(90),m(w),r(90),m(h),r(90)]; }
function star(side) { const o=[]; for (let k=0;k<5;k++) o.push(m(side), r(144)); return o; }
function expandFig(op,a) {
  if (op==="circle")   return poly(36,(2*Math.PI*a[0])/36);
  if (op==="square")   return poly(4,a[0]);
  if (op==="triangle") return poly(3,a[0]);
  if (op==="star")     return star(a[0]);
  if (op==="polygon")  return poly(Math.max(3,Math.round(a[0])),a[1]);
  if (op==="rectangle")return rect(a[0],a[1]);
  return [];
}
function tokenize(s) {
  return s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"")
          .replace(/\[/g," [ ").replace(/\]/g," ] ").split(/\s+/).filter(Boolean);
}
function parse(toks) {
  const out = []; let i = 0;
  while (i < toks.length) {
    const w = toks[i++]; const op = CMD[w];
    if (!op) continue;
    if (op === "repeat") {
      const n = parseInt(toks[i++],10); i++; // consume [
      const body = []; let d = 1;
      while (i < toks.length && d > 0) {
        if (toks[i] === "[") d++; else if (toks[i] === "]") { d--; if (!d) break; }
        body.push(toks[i++]);
      }
      i++; const inner = parse(body);
      for (let k=0;k<n;k++) out.push(...inner);
      continue;
    }
    if (FIG[op]) { const args=[]; for (let k=0;k<FIG[op];k++) args.push(parseFloat(toks[i++])); out.push(...expandFig(op,args)); continue; }
    if (op === "color") { const c = toks[i++]; out.push({op:"color", value: COLORS[c] || c}); continue; }
    if (["move","moveb","right","left","width"].includes(op)) { out.push({op, value: parseFloat(toks[i++])}); continue; }
    out.push({op});
  }
  return out;
}
// Returns an <svg> string sized to fit, drawing exactly what the program makes.
// The shape draws itself (stroke-dashoffset) and a little turtle crawls along it.
// opts.dot = show a green dot where the turtle starts (helps read forward/turns).
let __pid = 0;
function render(src, opts) {
  opts = opts || {};
  const ops = parse(tokenize(src));
  let x=0,y=0,h=0,pen=true,color="#2b2c34",width=6;
  const segs=[]; const xs=[0], ys=[0];
  for (const o of ops) {
    if (o.op==="penup") pen=false;
    else if (o.op==="pendown") pen=true;
    else if (o.op==="color") color=o.value;
    else if (o.op==="width") width=Math.max(1,o.value);
    else if (o.op==="right") h+=o.value;
    else if (o.op==="left") h-=o.value;
    else if (o.op==="move"||o.op==="moveb") {
      const dist=(o.op==="move"?1:-1)*o.value, rad=h*Math.PI/180;
      const nx=x+Math.sin(rad)*dist, ny=y+Math.cos(rad)*dist;
      if (pen) segs.push({x1:x,y1:y,x2:nx,y2:ny});
      x=nx; y=ny; xs.push(nx); ys.push(ny);
    }
  }
  const minX=Math.min(...xs), maxX=Math.max(...xs), minY=Math.min(...ys), maxY=Math.max(...ys);
  const pad = 12 + width;
  const vbX = minX - pad, vbY = -maxY - pad;
  const vbW = (maxX - minX) + 2*pad || 1, vbH = (maxY - minY) + 2*pad || 1;

  // build one continuous path (M at the start / after any gap, L for each step) — y is flipped
  let d = "", px = null, py = null, total = 0;
  for (const s of segs) {
    if (px === null || Math.abs(s.x1-px) > 0.01 || Math.abs(s.y1-py) > 0.01)
      d += `M${s.x1.toFixed(1)} ${(-s.y1).toFixed(1)} `;
    d += `L${s.x2.toFixed(1)} ${(-s.y2).toFixed(1)} `;
    total += Math.hypot(s.x2-s.x1, s.y2-s.y1);
    px = s.x2; py = s.y2;
  }
  if (!d) return `<svg viewBox="-10 -10 20 20"></svg>`;

  const dur = Math.min(5, Math.max(1.6, total / 130)).toFixed(2); // seconds, scaled to size
  const pid = "fp" + (++__pid);
  const dot = opts.dot ? `<circle cx="0" cy="0" r="8" fill="#3f8c3a"/>` : "";
  // a tiny turtle that crawls the path; rotate="auto" so its head (+x) leads the way
  const crawler = `<g class="crawler">
    <ellipse rx="9" ry="7" fill="#7bc96f" stroke="#3f8c3a" stroke-width="1.5"/>
    <circle cx="9" cy="0" r="4" fill="#a3d977"/><circle cx="11" cy="-1.3" r="1" fill="#1c1c1c"/>
    <animateMotion dur="${dur}s" repeatCount="indefinite" rotate="auto"
      calcMode="linear" keyTimes="0;0.6;1" keyPoints="0;1;1"><mpath xlink:href="#${pid}"/></animateMotion>
  </g>`;

  return `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" `
    + `viewBox="${vbX.toFixed(1)} ${vbY.toFixed(1)} ${vbW.toFixed(1)} ${vbH.toFixed(1)}" preserveAspectRatio="xMidYMid meet">`
    + `<path id="${pid}" d="${d.trim()}" fill="none" stroke="${color}" stroke-width="${width}" `
    + `stroke-linecap="round" stroke-linejoin="round" pathLength="1" class="draw" style="animation-duration:${dur}s"/>`
    + `${dot}${crawler}</svg>`;
}

/* ---------- turtle mascot ---------- */
document.getElementById("mascot").innerHTML = `
  <ellipse cx="28" cy="72" rx="11" ry="8" fill="#a3d977" transform="rotate(35 28 72)"/>
  <ellipse cx="72" cy="72" rx="11" ry="8" fill="#a3d977" transform="rotate(-35 72 72)"/>
  <ellipse cx="26" cy="38" rx="11" ry="8" fill="#a3d977" transform="rotate(-35 26 38)"/>
  <ellipse cx="74" cy="38" rx="11" ry="8" fill="#a3d977" transform="rotate(35 74 38)"/>
  <circle cx="50" cy="16" r="13" fill="#a3d977"/>
  <circle cx="45" cy="13" r="2.4" fill="#1c1c1c"/><circle cx="55" cy="13" r="2.4" fill="#1c1c1c"/>
  <circle cx="50" cy="52" r="30" fill="#7bc96f" stroke="#3f8c3a" stroke-width="3"/>
  <path d="M50 30 L50 74 M30 52 L70 52 M36 37 L64 67 M64 37 L36 67" stroke="#3f8c3a" stroke-width="2.4" fill="none" opacity=".55"/>`;

/* every card shows the same 3 things: picture · what to type · Enter.
   `steps` is a list of short lines — each one is typed and run with its own Enter. */
const enterKey = `<span class="enter"><span class="sym">↵</span><span class="lbl">ENTER</span></span>`;
function card(picSVG, steps, mini) {
  const lines = steps.map(s => `<div class="say"><span class="code">${s}</span>${enterKey}</div>`).join("");
  return `<div class="card${mini ? " mini" : ""}">
    ${picSVG}
    <div class="steps">${lines}</div>
  </div>`;
}

/* --- Section 1: very basic commands, one step per Enter (short forms) --- */
/* green dot = where the turtle starts, so forward / turns are easy to read */
const BASIC = [
  ["av 120"],                  // adelante
  ["re 120"],                  // atras
  ["av 60", "gd 90", "av 60"], // derecha
  ["av 60", "gi 90", "av 60"], // izquierda
];
document.getElementById("basic").innerHTML =
  BASIC.map(steps => card(`<div class="pic">${render(steps.join(" "), {dot:true})}</div>`, steps)).join("");

/* --- Section 2: colors (a blob of the color + the words to type) --- */
const COLOR_CARDS = [
  ["rojo","#e63946"], ["azul","#1d72c4"], ["verde","#2a9d39"], ["amarillo","#f1c40f"],
  ["naranja","#f3722c"], ["morado","#8e44ad"], ["rosa","#ff5d8f"], ["turquesa","#06b6d4"],
  ["lima","#84cc16"], ["marron","#8b5a2b"], ["gris","#7d8597"], ["negro","#2b2c34"],
];
document.getElementById("colors").innerHTML =
  COLOR_CARDS.map(([name,hex]) =>
    card(`<div class="blob" style="background:${hex}"></div>`, [`color ${name}`], true)).join("");

/* --- Section 3: pictures — color first (Enter), then the shape (Enter) --- */
const PICTURES = [
  ["color rojo", "cu 90"],
  ["color azul", "ci 55"],
  ["color verde", "tr 100"],
  ["color naranja", "pg 6 55"],
  ["color morado", "es 110"],
  ["color rosa", "rc 110 60"],
  ["color azul", "rp 6 [ ci 35 gd 60 ]"],
  ["color naranja", "rp 12 [ av 70 re 70 gd 30 ]"],
  ["color verde", "rp 6 [ cu 70 gd 60 ]"],
];
document.getElementById("pictures").innerHTML =
  PICTURES.map(steps => card(`<div class="pic">${render(steps.join(" "))}</div>`, steps)).join("");
</script>
</body>
</html>
